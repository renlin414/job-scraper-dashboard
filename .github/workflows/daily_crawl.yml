name: 🚀 每日秋招情报抓取

# 触发条件：每天定时触发 + 允许手动点击触发
on:
  schedule:
    # 每天北京时间早上 8:00 运行 (服务器使用 UTC 时间，0点对应北京时间 8点)
    - cron: '0 0 * * *'
  workflow_dispatch: # 加上这个，你可以随时手动点按钮测试

jobs:
  run-scraper:
    runs-on: ubuntu-latest # 给我们分配一台免费的 Linux 云电脑

    steps:
      - name: 📦 拉取最新代码
        uses: actions/checkout@v3

      - name: 🐍 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙️ 安装依赖库
        run: |
          pip install requests pandas openai

      - name: 🕷️ 运行爬虫与 AI 分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # 从保险箱读取密码
        run: python scraper.py

      - name: 💾 将新数据保存回仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add jobs_daily.csv
          # 检查文件是否有变动，如果有变动就提交并推送到仓库
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新：秋招每日数据" && git push)
